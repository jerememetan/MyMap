    <title>City of Paradox Project</title>
    <script>
      // GitHub Pages SPA fallback: convert ?/path back into /path before app boot.
      (function () {
        var redirect = window.location.search.match(/^[?&]p=([^&]+)/);
        if (!redirect) return;

        var decodedPath = decodeURIComponent(redirect[1]).replace(
          /~and~/g,
          "&",
        );
        var newUrl = decodedPath + window.location.hash;
        window.history.replaceState(null, null, newUrl);
      })();
    </script>
